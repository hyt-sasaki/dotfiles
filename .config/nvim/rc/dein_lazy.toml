[[plugins]]
repo = 'Shougo/denite.nvim'
on_cmd = ['Denite', 'DeniteBufferDir', 'DeniteCursorWord', 'DeniteProjectDir']
hook_post_source = '''
    call denite#custom#map('insert', "<C-n>", '<denite:move_to_next_line>')
    call denite#custom#map('insert', "<C-p>", '<denite:move_to_previous_line>')

    " tabopen や vsplit のキーバインドを割り当て
    call denite#custom#map('insert', "<C-t>", '<denite:do_action:tabopen>')
    call denite#custom#map('insert', "<C-v>", '<denite:do_action:vsplit>')
    call denite#custom#map('normal', "v", '<denite:do_action:vsplit>')
'''
hook_add = '''
    "prefix keyの設定
    nmap <Space> [denite]

    "スペースキーとcキーでカレントディレクトリを表示
    nnoremap <silent> [denite]c :<C-u>DeniteBufferDir -buffer-name=files -mode=normal -default-action=tabopen file<CR>
    "スペースキーとfキーでバッファと最近開いたファイル一覧を表示
    nnoremap <silent> [denite]f :<C-u>Denite<Space>buffer file_mru -default-action=tabopen -mode=normal -default-action=tabopen<CR>
    "スペースキーとdキーで最近開いたディレクトリを表示
    nnoremap <silent> [denite]d :<C-u>Denite<Space>directory_mru -mode=normal<CR>
    "スペースキーとbキーでバッファを表示
    nnoremap <silent> [denite]b :<C-u>Denite<Space>buffer<CR>
    "スペースキーとnキーでカーソル下の単語を検索
    nnoremap <silent> [denite]n :<C-u>DeniteCursorWord<Space>grep -smartcase -mode=normal<CR>
    "スペースキーとNキーでカーソル下の単語を検索しタブで開く
    nnoremap <silent> [denite]N :<C-u>DeniteCursorWord<Space>grep -smartcase -mode=normal -default-action=tabopen<CR>
    "スペースキーとrキーでレジストリを表示
    nnoremap <silent> [denite]r :<C-u>Denite<Space>register<CR>
    "スペースキーとtキーでタブを表示
    nnoremap <silent> [denite]t :<C-u>Denite<Space>tab<CR>
    "スペースキーとhキーでヒストリ/ヤンクを表示
    nnoremap <silent> [denite]h :<C-u>Denite<Space>neoyank<CR>
    "スペースキーとoキーでoutline
    nnoremap <silent> [denite]o :<C-u>silent! Denite<Space>outline<CR>
    "スペースキーとENTERキーでfile_rec:!
    nnoremap <silent> [denite]<CR> :<C-u>Denite<Space>file_rec:!<CR>
    "denite.vimを開いている間のキーマッピング
    "autocmd FileType denite call s:denite_my_settings()
    "function! s:denite_my_settings()"{{{
    "    " ESCでdeniteを終了
    "    nmap <buffer> <ESC> <Plug>(denite_exit)
    "endfunction"}}}
    " set number
    autocmd FileType denite setlocal number
    autocmd BufWinEnter,BufEnter * setlocal number
'''

[[plugins]]
repo = 'vim-latex/vim-latex'
on_ft = ['tex', 'latex', 'plaintex']
hook_source = '''
    set grepprg=grep\ -nH\ $*
    set shellslash
    let g:Imap_UsePlaceHolders = 1
    let g:Imap_DeleteEmptyPlaceHolders = 1
    let g:Imap_StickyPlaceHolders = 0
    let g:Tex_DefaultTargetFormat = 'pdf'
    let g:Tex_MultipleCompileFormats='dvi,pdf'
    let g:Tex_FormatDependency_pdf = 'dvi,pdf'
    let g:Tex_CompileRule_dvi = 'platex -synctex=1 -interaction=nonstopmode -file-line-error-style $*'
    let g:Tex_CompileRule_pdf = 'dvipdfmx $*.dvi'
    let g:Tex_BibtexFlavor = 'pbibtex'
    let g:Tex_UseEditorSettingInDVIViewer = 1
    if has("mac")
        let g:Tex_ViewRule_pdf = 'Skim'
    elseif has("unix")
        let g:Tex_ViewRule_dvi = 'xdvi -expert'
        let g:Tex_ViewRule_pdf = 'Okular'
    endif
'''


