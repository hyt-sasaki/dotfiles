[[plugins]]
repo = 'Shougo/neocomplete.vim'
on_event = 'InsertEnter'
hook_source = '''
    let g:neocomplete#enable_at_startup = 1
    let g:neocomplete#acp_enableAtStartup = 0
    let g:neocomplete#enable_smart_case = 1
'''

[[plugins]]
repo = 'Shougo/neosnippet'
on_i = 1
hook_source = '''
    " For snippet_complete marker.
    if has('conceal')
       set conceallevel=2 concealcursor=i
    endif
'''
hook_add = '''
    " <TAB>: completion.
    " inoremap <expr><TAB> pumvisible() ? '\<C-n>' : '\<TAB>'
    inoremap <expr><S-TAB> pumvisible() ? '\<C-p>' : '\<S-TAB>'

    " Plugin key-mappings.
    imap <C-k> <Plug>(neosnippet_expand_or_jump)
    smap <C-k> <Plug>(neosnippet_expand_or_jump)

    " SuperTab like snippets behavior.
    imap <expr><TAB> pumvisible() ? "\<C-n>" : neosnippet#jumpable() ? "\<Plug>(neosnippet_expand_or_jump)" : "\<TAB>"
    smap <expr><TAB> neosnippet#jumpable() ? "\<Plug>(neosnippet_expand_or_jump)" : "\<TAB>"
'''

[[plugins]]
repo = 'davidhalter/jedi-vim'
on_ft = ['python']
hook_source = '''
    augroup python_config
        autocmd!
        autocmd FileType python setlocal omnifunc=jedi#completions
        autocmd FileType python setlocal completeopt-=preview
    augroup END

    let g:jedi#completions_enabled = 0
    let g:jedi#auto_vim_configuration = 0
    let g:jedi#rename_command = '<Leader>R'
    let g:jedi#show_call_signatures = 1
    let g:jedi#show_call_signatures_delay = 100
    let g:jedi#popup_on_dot = 0

    if !exists('g:neocomplete#force_omni_input_patterns')
        let g:neocomplete#force_omni_input_patterns = {}
    endif
    "let g:neocomplete#force_omni_input_patterns.python = '\h\w*\|[^. \t]\.\w*'
    let g:neocomplete#force_omni_input_patterns.python = '\%([^. \t]\.\|^\s*@\|^\s*from\s.\+import \|^\s*from \|^\s*import \)\w*'
'''

[[plugins]]
repo = 'tweekmonster/braceless.vim'
on_ft = 'python'
hook_source = '''
    autocmd FileType python BracelessEnable +fold +highlight
'''

[[plugins]]
# ctagsのインストールが必要
repo = 'soramugi/auto-ctags.vim'
on_ft = ['python', 'markdown', 'tex', 'plaintex']
hook_source = '''
    let g:auto_ctags = 1
    let g:auto_ctags_directory_list = ['.git']
    let g:auto_ctags_tags_args = '--tag-relative --recurse --sort=yes'
'''

[[plugins]]
repo = 'Shougo/unite-outline'
on_ft = ['python', 'markdown']

[[plugins]]
repo = 'nathanaelkane/vim-indent-guides'
on_ft = ['python']
hook_source = '''
    " vim-indent-guides
    " Vim 起動時 vim-indent-guides を自動起動
    let g:indent_guides_enable_on_vim_startup=1
    " ガイドをスタートするインデントの量
    let g:indent_guides_start_level=2
    " 自動カラー無効
    let g:indent_guides_auto_colors=0
    " ガイドの色指定
    augroup python_color
        autocmd!
        autocmd VimEnter,Colorscheme *.py :hi IndentGuidesOdd  guibg=#444433 ctermbg=darkgray
        autocmd VimEnter,Colorscheme *.py :hi IndentGuidesEven guibg=#333344 ctermbg=black
    augroup END
    " ガイドの幅
    let g:indent_guides_guide_size = 1
'''

[[plugins]]
repo = 'scrooloose/syntastic'
on_ft = ['python']
hook_source = '''
    function! <SID>LocationPrevious()
      try
        lprev
      catch /^Vim\%((\a\+)\)\=:E553/
        llast
      endtry
    endfunction

    function! <SID>LocationNext()
      try
        lnext
      catch /^Vim\%((\a\+)\)\=:E553/
        lfirst
      endtry
    endfunction

    nnoremap <silent> <Plug>LocationPrevious    :<C-u>silent! exe 'call <SID>LocationPrevious()'<CR>
    nnoremap <silent> <Plug>LocationNext        :<C-u>silent! exe 'call <SID>LocationNext()'<CR>
    nmap <silent> ,p <Plug>LocationPrevious
    nmap <silent> ,n <Plug>LocationNext
    nmap <silent> ,E :Errors<CR>

    let g:syntastic_always_populate_loc_list = 1
    " Disable automatic check at file open/close
    let g:syntastic_check_on_open=0
    let g:syntastic_check_on_wq=0
    " Python
    " flake8のインストールが必要 (pip install flake8)
    let g:syntastic_python_checkers = ['flake8']
    let g:syntastic_python_flake8_args='--ignore=E265,E266'
'''

[[plugins]]
repo = 'kannokanno/previm'
on_ft = ['markdown']
hook_add = '''
    let g:previm_open_cmd = 'open -a Firefox'
    " markdownのプレビュー
    augroup markdown_preview
        autocmd!
        autocmd BufRead,BufNewFile *.md set filetype=markdown
        autocmd BufRead,BufNewFile *.md nnoremap <Leader>r :set filetype=markdown<CR>:PrevimOpen<CR>
        autocmd BufWritePre *.md :set filetype=markdown
    augroup END
'''

[[plugins]]
repo = 'rcmdnk/vim-markdown'
on_ft = ['markdown']
hook_source = '''
    let g:vim_markdown_folding_disabled = 1
'''

[[plugins]]
repo = 'joker1007/vim-markdown-quote-syntax'
on_ft = ['markdown']

[[plugins]]
repo = 'vim-latex/vim-latex'
on_ft = ['tex', 'plaintex']
hook_source = '''
    " Vim-LaTeXを利用するファイルの拡張子を設定する
    "let g:tex_flavor='tex'
    let g:tex_flavor='latex'
    let g:Tex_DefaultTargetFormat = 'pdf'
    set shellslash
    " IMPORTANT: grep will sometimes skip displaying the file name if you
    " search in a singe file. This will confuse latex-suite. Set your grep
    " program to alway generate a file-name.
    set grepprg=grep\ -nH\ $*
    "" .texファイルのコンパイルプログラムを指定(エラーで停止しないようオプション指定)
    let g:Tex_CompileRule_dvi = 'platex --interaction=nonstopmode $*'
    "" .bibファイルのコンパイルプログラムを指定
    let g:Tex_BibtexFlavor = 'upbibtex'
    "" pdfファイル生成のための依存関係を記述
    let g:Tex_FormatDependency_pdf = 'pdf'
    "" .dviファイルのコンパイルプログラムを指定
    "let g:Tex_CompileRule_pdf = 'dvipdfmx $*.dvi'
    let g:Tex_CompileRule_pdf = 'pdflatex -interaction=nonstopmode $*'
    "let g:Tex_MultipleCompileFormats = 'pdf'" .pdfファイルのビュープログラムを指定 環境に合わせてパスを設定すること
    let g:Tex_MultipleCompileFormats = 'pdf'
    "let g:Tex_ViewRule_pdf = '/usr/bin/open -a Skim.app'
    let g:Tex_ViewRule_pdf = 'Skim'
    let g:Tex_IgnoredWarnings =
          \"Underfull\n".
          \"Overfull\n".
          \"specifier changed to\n".
          \"You have requested\n".
          \"Missing number, treated as zero.\n".
          \"There were undefined references\n".
          \"Citation %.%# undefined\n".
          \'LaTeX Font Warning:'"
    let g:Tex_IgnoreLevel = 12
'''
hook_add = '''
    nnoremap <Leader>lp :TTarget pdf<CR>
'''

[[plugins]]
repo = 'gi1242/vim-tex-syntax'
on_ft = ['tex', 'plaintex']



[[plugins]]
repo = 'thinca/vim-quickrun'
on_ft = ['python']
on_map = '<Leader>r'
on_cmd = 'QuickRun'
hook_source = '''
    if !exists('g:quickrun_config')
       let g:quickrun_config = {}
    endif

    let g:quickrun_config['_'] = {
               \ 'runner/vimproc/updatetime' : 80,
               \ 'outputter' : 'error',
               \ 'outputter/buffer/split' : ':rightbelow 8sp',
               \ 'outputter/error/error' : 'buffer',
               \ 'outputter/error/success' : 'buffer',
               \ 'runner' : 'vimproc',
               \ }

    let g:quickrun_config['python'] = {
               \ 'command': 'python',
               \ 'exec': '%c %o %s %a',
               \ 'hook/eval/template': 'print(%s)',
               \ 'hook/output_encode/encoding': 'utf-8',
               \ }


    nnoremap ,q :cd ../..<CR> :QuickRun<CR>
    nnoremap <expr><silent> <C-c> quickrun#is_running() ? quickrun#sweep_sessions() : "\<C-c>"
'''
